name: Daily Digest Build

on:
  schedule:
    # 0:30 UTC = 8:30 Beijing time, daily (morning edition)
    - cron: '30 0 * * *'
    # 12:00 UTC = 20:00 Beijing time, daily (evening edition)
    - cron: '0 12 * * *'
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Scripts use only Python stdlib (urllib, xml.etree, json, html)
          # No external packages required.

      - name: Fetch AI dashboard
        working-directory: scripts
        run: python fetch_ai.py

      - name: Fetch Finance dashboard
        working-directory: scripts
        run: python fetch_finance.py

      - name: Fetch Affairs dashboard
        working-directory: scripts
        run: python fetch_affairs.py

      - name: Fetch Politics dashboard
        working-directory: scripts
        run: python fetch_politics.py

      - name: Build index
        working-directory: scripts
        run: python build_index.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            # Label edition by Beijing hour: 8-11 = morning, 20-23 = evening
            BJ_HOUR=$(TZ='Asia/Shanghai' date +%H)
            if [ "$BJ_HOUR" -ge 20 ] && [ "$BJ_HOUR" -lt 24 ]; then
              EDITION="evening"
            else
              EDITION="morning"
            fi
            git commit -m "chore(daily): auto-update dashboards ($EDITION) [$(TZ='Asia/Shanghai' date +%Y-%m-%d)]"
            git push
          fi
